version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: forms_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret_pass
      POSTGRES_DB: dynamic_forms
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    container_name: forms_api
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:secret_pass@db:5432/dynamic_forms
    depends_on:
      - db

volumes:
  postgres_data: